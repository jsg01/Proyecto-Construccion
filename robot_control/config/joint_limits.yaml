joint_limits:
  shoulder_pan_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: -3.14   # limitar el giro de base
    max_position: 3.14

  shoulder_lift_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: -2.8    # más natural para sobre mesa
    max_position: -0.2    # evita que el brazo apunte hacia arriba

  elbow_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: 0.5     # fuerza configuración codo-arriba
    max_position: 2.8

  wrist_1_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: -2.0
    max_position: -0.5    # mantiene muñeca en rango natural

  wrist_2_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: -0.1
    max_position: 3.14    # o lo que corresponda a apuntar hacia abajo

  wrist_3_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.5
    has_position_limits: true
    min_position: -3.14
    max_position: 3.14
